# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Mouse controls
set -g mouse on

# Emit the session name as the terminal window title. The claude/notify.py hook
# matches this against `aerospace list-windows` to find which window/workspace
# hosts a given tmux session.
set -g set-titles on
set -g set-titles-string '#S'

# Stay attached when a session is destroyed (switch to next session instead of bare shell)
set -g detach-on-destroy off

# Vi-style copy mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# Active pane focus visibility
set -g pane-active-border-style 'fg=colour208,bold'
set -g pane-border-style 'fg=colour240'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=colour208 bold],#[fg=colour240]} #P: #{pane_title} #[default]'

# Dim inactive panes to reinforce focus (remove if unwanted)
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=terminal'

# Open new panes/windows in current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
